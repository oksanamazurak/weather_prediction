name: Model CI/CD

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: AWS

    steps:
      # =========================
      # Checkout repository
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # Set up Python
      # =========================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # =========================
      # Install dependencies
      # =========================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[s3]"

      # =========================
      # Configure AWS credentials (IMPORTANT FIX)
      # =========================
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      # =========================
      # Pull data from DVC
      # =========================
      - name: Pull data with DVC
        run: |
          dvc pull

      # =========================
      # Train model
      # =========================
      - name: Train model
        env:
          CI: "true"
          F1_THRESHOLD: "0.30"
          MLFLOW_TRACKING_URI: "file:./mlruns"
        run: |
          python src/train.py data/prepared output

      # =========================
      # Run tests
      # =========================
      - name: Run tests
        env:
          F1_THRESHOLD: "0.30"
        run: |
          pytest -q

      # =========================
      # BASELINE COMPARISON (PR only)
      # =========================
      - name: Compare with baseline
        if: github.event_name == 'pull_request'
        run: |
          python compare_metrics.py

      # =========================
      # CML REPORT (PR only)
      # =========================
      - name: Create CML report
        if: github.event_name == 'pull_request'
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install cml
          echo "## Model Metrics" > report.md
          cat metrics.json >> report.md
          echo "" >> report.md
          echo "## Regression Comparison" >> report.md
          python compare_metrics.py >> report.md || true
          cml comment create report.md

      # =========================
      # CD: Upload artifact (main only)
      # =========================
      - name: Upload model artifact (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: output/rf_model.pkl