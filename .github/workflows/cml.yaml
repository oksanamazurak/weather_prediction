name: Model CI/CD

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # =========================
      # Install dependencies
      # =========================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[s3]"

      # =========================
      # Configure AWS credentials
      # =========================
      - name: Configure AWS
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          echo "AWS credentials configured"

      # =========================
      # Pull data from DVC
      # =========================
      - name: Pull data with DVC
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          dvc pull

      # =========================
      # Train model
      # =========================
      - name: Train model
        env:
          CI: "true"
          F1_THRESHOLD: "0.70"
        run: |
          python src/train.py data/prepared output

      # =========================
      # Run tests
      # =========================
      - name: Run tests
        env:
          F1_THRESHOLD: "0.70"
        run: |
          pytest -q

      # =========================
      # BASELINE COMPARISON (PR only)
      # =========================
      - name: Compare with baseline
        if: github.event_name == 'pull_request'
        run: |
          python compare_metrics.py

      # =========================
      # CML REPORT (PR only)
      # =========================
      - name: Create CML report
        if: github.event_name == 'pull_request'
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install cml
          echo "## Model Metrics" > report.md
          cat metrics.json >> report.md
          echo "" >> report.md
          echo "## Regression Comparison" >> report.md
          python compare_metrics.py >> report.md || true
          cml comment create report.md

      # =========================
      # CD: Upload artifact (main only)
      # =========================
      - name: Upload model artifact (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: output/rf_model.pkl